name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish ${{ matrix.bundle-name }} (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundle-name: Windows
            args: "--bundles nsis msi"
          - platform: ubuntu-latest
            bundle-name: Linux
            args: "--bundles deb rpm appimage"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Markdown Pad ${{ github.ref_name }}
          releaseBody: |
            Automated Markdown Pad release.

            Installers:
            - Windows: use the .exe setup file, or the .msi package.
            - Fedora/RHEL-style Linux: use the .rpm package.
            - Linux Mint/Debian/Ubuntu-style Linux: use the .deb package.
            - Portable Linux: use the .AppImage package. AppImage is convenient, but it usually does not register file associations by itself.

            The native Linux packages include desktop metadata. If .md files do not automatically open in Markdown Pad after installation, set Markdown Pad as the default app for Markdown files in your desktop environment, or run: xdg-mime default app.markdownpad.desktop.desktop text/markdown

            This project was made entirely by AI. Pull requests for fixes and new features are welcome.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
